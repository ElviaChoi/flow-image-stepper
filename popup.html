<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flow Image Stepper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Flow Image Stepper ✨</h1>
        <p>캐릭터 일관성을 유지할 수 있도록 캐릭터 시트와 장면 이미지를 Flow에서 단계별로 생성합니다.</p>
      </header>

      <label class="field">
        <span>전체 프롬프트 원본</span>
        <textarea id="source" spellcheck="false" placeholder="캐릭터 시트와 장면 프롬프트 전체를 붙여넣으세요."></textarea>
      </label>

      <section class="settings">
        <label>
          <span>모델</span>
          <select id="model">
            <option value="Nano Banana Pro" selected>Nano Banana Pro</option>
            <option value="Nano Banana 2">Nano Banana 2</option>
          </select>
        </label>
        <label>
          <span>장면 생성 수</span>
          <select id="sceneCount">
            <option value="2" selected>x2</option>
            <option value="1">x1</option>
            <option value="3">x3</option>
            <option value="4">x4</option>
          </select>
        </label>
        <label>
          <span>화면 비율</span>
          <select id="aspectRatio">
            <option value="16:9" selected>16:9</option>
            <option value="4:3">4:3</option>
            <option value="1:1">1:1</option>
            <option value="3:4">3:4</option>
            <option value="9:16">9:16</option>
          </select>
        </label>
      </section>

      <section class="actions">
        <div class="action-group">
          <h2>준비</h2>
          <div class="button-grid">
            <button id="parse" class="button-primary">목록 만들기</button>
            <button id="clearSource" type="button" class="button-muted">전체 작업 초기화</button>
          </div>
        </div>

        <div class="action-group">
          <h2>생성</h2>
          <div class="button-grid">
            <button id="runCharacters">다음 캐릭터 생성</button>
            <button id="runScenes" class="button-primary">다음 장면 생성</button>
          </div>
        </div>

        <div class="action-group">
          <h2>복구</h2>
          <div class="button-grid">
            <button id="recoverScene" type="button">최신 결과 저장</button>
            <button id="backScene" type="button">장면 다시 생성</button>
          </div>
        </div>

        <div class="action-group">
          <h2>내보내기</h2>
          <button id="downloadScenes" type="button" class="button-download">장면 이미지 다운로드</button>
        </div>
      </section>

      <section>
        <h2>진행 요약</h2>
        <div id="summary" class="panel empty">Not parsed yet.</div>
      </section>

      <section>
        <h2>개별 프롬프트 수정</h2>
        <div id="promptEditor" class="prompt-editor panel empty">결과가 마음에 들지 않으면 해당 캐릭터나 장면의 프롬프트만 수정해 다시 생성할 수 있습니다.</div>
      </section>

      <section>
        <h2>로그</h2>
        <pre id="log" class="panel log"></pre>
      </section>
    </main>
    <script src="parser.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
